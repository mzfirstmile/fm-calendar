<!DOCTYPE html>
<html>
<head><title>Migrate Exec Data: Airtable → Supabase</title></head>
<body style="font-family:monospace;padding:20px;max-width:900px;margin:auto">
<h2>Exec Dashboard Migration: Airtable → Supabase</h2>
<p>Migrates Bank Transactions, Investments, and Liabilities from Airtable to Supabase.</p>
<p><strong>Pre-requisite:</strong> Run <code>setup_exec_tables.sql</code> in Supabase SQL Editor first.</p>

<label>Airtable PAT: <input id="atToken" style="width:400px" placeholder="pat..."></label><br><br>
<label>Supabase URL: <input id="sbUrl" style="width:400px" placeholder="https://xxx.supabase.co"></label><br><br>
<label>Supabase Key: <input id="sbKey" style="width:400px" placeholder="eyJ..."></label><br><br>

<div style="display:flex;gap:10px">
  <button onclick="migrateTransactions()" style="padding:10px 16px;font-size:14px">1. Migrate Transactions</button>
  <button onclick="migrateInvestments()" style="padding:10px 16px;font-size:14px">2. Migrate Investments</button>
  <button onclick="migrateLiabilities()" style="padding:10px 16px;font-size:14px">3. Migrate Liabilities</button>
  <button onclick="migrateAll()" style="padding:10px 16px;font-size:14px;background:#0070f3;color:#fff;border:none;border-radius:6px;cursor:pointer">Run All</button>
</div>

<pre id="log" style="background:#111;color:#0f0;padding:16px;margin-top:16px;max-height:500px;overflow:auto"></pre>

<script>
const AT_BASE = 'appTXzlQGcpVk3IcU';
const TRANS_TABLE = 'tbl9ahPA1hA2hZrv0';
const INV_TABLE = 'tblzZn4NMXUYRZBqt';
const LIAB_TABLE = 'tblh9ZKlCwyreJ8tM';

// Field ID maps (from Airtable)
const INV_FIELDS = { name:'fldX5ys676ayoxNYc', ownership:'fldU6w5LV9vnwBStm', committed:'fldQwyDR70uO6gJUR',
  contributed:'fldJSQQcIZAoNqSk6', distributed:'fldtO65Vvx5qG001G', unreturned:'fldVsxc6dj0X7Z7OS',
  netEquity:'fldviDb8s6v42qhza', valuation:'fld0EfM7mI7qdfNIf', status:'fld5SZIIZQ8Rwf2Ha', membershipClass:'fldq3aDBIuBTwmFrr' };
const LIAB_FIELDS = { lender:'fldvvtM6ou0ZADJie', relatedDeal:'fldCi9osyG9TUL600', principal:'fldM2nEv5uDF5KgCU',
  currency:'fldPeNMUOK590jdU6', usdEquiv:'fldxjjIHSsPbzToQZ', maturity:'fld6ZRgiKHCf7dzGx', status:'fld98KXnfxZiK2mg3', notes:'fldckrJ6NdV2mgllf' };

function log(msg) { document.getElementById('log').textContent += msg + '\n'; }
function getVals() {
  return { at: document.getElementById('atToken').value.trim(), sb: document.getElementById('sbUrl').value.trim(), sk: document.getElementById('sbKey').value.trim() };
}

async function fetchAT(table) {
  const { at } = getVals();
  let records = [], offset = null;
  do {
    const url = `https://api.airtable.com/v0/${AT_BASE}/${table}?pageSize=100${offset ? '&offset=' + offset : ''}`;
    const r = await fetch(url, { headers: { 'Authorization': `Bearer ${at}` } });
    const data = await r.json();
    if (data.error) { log('Airtable error: ' + JSON.stringify(data.error)); return []; }
    records.push(...data.records);
    offset = data.offset || null;
  } while (offset);
  return records;
}

async function insertSB(table, rows) {
  const { sb, sk } = getVals();
  for (let i = 0; i < rows.length; i += 50) {
    const batch = rows.slice(i, i + 50);
    const r = await fetch(`${sb}/rest/v1/${table}`, {
      method: 'POST',
      headers: { 'apikey': sk, 'Authorization': `Bearer ${sk}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(batch)
    });
    if (!r.ok) { log(`Error batch ${i}: ${await r.text()}`); return false; }
    log(`  Inserted ${i + batch.length} / ${rows.length}`);
  }
  return true;
}

function getF(f, key, fid) {
  if (f[key] !== undefined) return f[key];
  if (fid && f[fid] !== undefined) return f[fid];
  return null;
}
function getSelect(v) { return typeof v === 'object' && v ? (v.name || '') : (v || ''); }

async function migrateTransactions() {
  log('\n=== Transactions ===');
  log('Fetching from Airtable...');
  const recs = await fetchAT(TRANS_TABLE);
  log(`Fetched ${recs.length} records`);
  const FIELD_MAP = { desc:'fldlJucnQS8E5dFYG', date:'fldgQFXI2kPiBQOdT', amount:'fld4aW3FyVbUmgFVf',
    ledger:'fldTMmHSCfpwHqP3J', txnType:'fldngEmDXwYGhijcY', creditDebit:'fld4vsI6lQ4zgYA43',
    acctName:'fldNG9VQSGRB3tdBI', acctNum:'fldQx16vpxLlf0X7O' };
  const rows = recs.map(r => {
    const f = r.fields;
    return {
      date: getF(f, 'Date', FIELD_MAP.date) || '1970-01-01',
      description: getF(f, 'Description', FIELD_MAP.desc) || '',
      amount: getF(f, 'Amount', FIELD_MAP.amount) || 0,
      ledger_balance: getF(f, 'Ledger Balance', FIELD_MAP.ledger),
      transaction_type: getSelect(getF(f, 'Transaction Type', FIELD_MAP.txnType)),
      credit_debit: getSelect(getF(f, 'Credit/Debit', FIELD_MAP.creditDebit)),
      account_name: getSelect(getF(f, 'Account Name', FIELD_MAP.acctName)),
      account_number: getSelect(getF(f, 'Account Number', FIELD_MAP.acctNum)),
    };
  });
  log(`Inserting ${rows.length} into Supabase...`);
  if (await insertSB('exec_transactions', rows)) log('Transactions done!');
}

async function migrateInvestments() {
  log('\n=== Investments ===');
  const recs = await fetchAT(INV_TABLE);
  log(`Fetched ${recs.length} records`);
  const rows = recs.map(r => {
    const f = r.fields;
    return {
      name: getF(f, 'Investment', INV_FIELDS.name) || 'Unknown',
      membership_class: getSelect(getF(f, 'Membership Class', INV_FIELDS.membershipClass)),
      ownership_pct: getF(f, 'Ownership %', INV_FIELDS.ownership) || 0,
      committed: getF(f, 'Committed', INV_FIELDS.committed) || 0,
      contributed: getF(f, 'Contributed', INV_FIELDS.contributed) || 0,
      distributed: getF(f, 'Distributed', INV_FIELDS.distributed) || 0,
      unreturned_capital: getF(f, 'Unreturned Capital', INV_FIELDS.unreturned) || 0,
      net_equity: getF(f, 'Net Equity', INV_FIELDS.netEquity) || 0,
      valuation: getF(f, 'Valuation', INV_FIELDS.valuation) || null,
      status: getSelect(getF(f, 'Status', INV_FIELDS.status)),
    };
  });
  log(`Inserting ${rows.length} into Supabase...`);
  if (await insertSB('exec_investments', rows)) log('Investments done!');
}

async function migrateLiabilities() {
  log('\n=== Liabilities ===');
  const recs = await fetchAT(LIAB_TABLE);
  log(`Fetched ${recs.length} records`);
  const rows = recs.map(r => {
    const f = r.fields;
    return {
      lender: getF(f, 'Lender / Description', LIAB_FIELDS.lender) || getF(f, 'Lender/Description', LIAB_FIELDS.lender) || 'Unknown',
      related_deal: getF(f, 'Related Deal', LIAB_FIELDS.relatedDeal) || '',
      principal: getF(f, 'Principal Amount', LIAB_FIELDS.principal) || 0,
      currency: getSelect(getF(f, 'Currency', LIAB_FIELDS.currency)) || 'USD',
      usd_equivalent: getF(f, 'USD Equivalent', LIAB_FIELDS.usdEquiv) || null,
      maturity_date: getF(f, 'Maturity Date', LIAB_FIELDS.maturity) || null,
      status: getSelect(getF(f, 'Status', LIAB_FIELDS.status)) || 'Active',
      notes: getF(f, 'Notes', LIAB_FIELDS.notes) || '',
    };
  });
  log(`Inserting ${rows.length} into Supabase...`);
  if (await insertSB('exec_liabilities', rows)) log('Liabilities done!');
}

async function migrateAll() {
  log('Starting full migration...');
  await migrateTransactions();
  await migrateInvestments();
  await migrateLiabilities();
  log('\n✅ All done! You can now remove Airtable from your workflow.');
}
</script>
</body>
</html>
