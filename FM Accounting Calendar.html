<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Mile Accounting Calendar — 2026</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<style>
  .logo-icon { height: 28px; width: auto; margin-right: 10px; vertical-align: middle; }
  :root {
    --bg: #e2e6ef;
    --surface: #ffffff;
    --surface2: #dde2ec;
    --border: #d4dbe8;
    --text: #1e2d44;
    --text-dim: #6b7d96;
    --accent: #00b0d4;
    --accent-dim: rgba(0,176,212,0.08);
    --green: #1a9a6b;
    --green-dim: rgba(26,154,107,0.08);
    --red: #e5534b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 32px 40px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .view-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .view-toggle button {
    padding: 8px 18px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-toggle button.active {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
  }

  .filters {
    padding: 0 40px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.2s;
    user-select: none;
  }

  .filter-chip.active {
    border-color: var(--chip-color, var(--accent));
    background: var(--chip-bg, var(--accent-dim));
    color: var(--chip-color, var(--accent));
  }

  /* ── Progress Bar ── */
  .progress-section {
    padding: 0 40px 20px;
  }

  .progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .progress-header .progress-label {
    font-size: 14px;
    font-weight: 600;
  }

  .progress-header .progress-label .done-count { color: var(--green); }
  .progress-header .progress-label .total-count { color: var(--text-dim); }

  .progress-actions { display: flex; gap: 8px; align-items: center; }

  .btn-sm {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.2s;
  }

  .btn-sm:hover { background: var(--surface2); color: var(--text); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
  .btn-sm.success { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  .progress-track {
    width: 100%;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .all-done-banner {
    margin-top: 10px;
    padding: 10px 16px;
    background: var(--green-dim);
    border: 1px solid rgba(26,154,107,0.3);
    border-radius: 8px;
    font-size: 13px;
    color: var(--green);
    font-weight: 600;
    text-align: center;
    display: none;
  }

  .all-done-banner.show { display: block; }

  /* ── Calendar View ── */
  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 0 40px 20px;
  }

  .calendar-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
  }

  .calendar-nav button:hover { background: var(--surface2); }
  .calendar-nav .month-label { font-size: 18px; font-weight: 600; min-width: 180px; text-align: center; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    margin: 0 40px 40px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .cal-header {
    background: var(--surface);
    padding: 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cal-day {
    background: var(--surface);
    min-height: 110px;
    padding: 8px;
    position: relative;
    transition: background 0.15s;
  }

  .cal-day:hover { background: var(--surface2); }
  .cal-day.empty { background: var(--bg); opacity: 0.4; }
  .cal-day.today { box-shadow: inset 0 0 0 2px var(--accent); }

  .cal-day .day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .cal-event {
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 10.5px;
    margin-bottom: 3px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.2s;
    border-left: 3px solid;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .cal-event:hover { filter: brightness(1.2); }
  .cal-event.checked { opacity: 0.45; }
  .cal-event.checked .ev-text { text-decoration: line-through; }
  .cal-event .ev-label { font-weight: 600; }

  .cal-check {
    width: 12px; height: 12px;
    border-radius: 3px;
    border: 1.5px solid;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 8px;
  }

  .cal-check.is-checked {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  /* ── List View ── */
  .list-view { padding: 0 40px 40px; display: none; }

  .inv-group { margin-bottom: 28px; }

  .inv-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .inv-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .inv-group-header h3 { font-size: 15px; font-weight: 600; }

  .inv-group-header .count {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .list-item {
    display: grid;
    grid-template-columns: 36px 80px 100px 1fr 110px;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 13px;
    transition: all 0.2s;
  }

  .list-item:hover { background: var(--surface2); }
  .list-item.checked { opacity: 0.5; }
  .list-item.checked .task { text-decoration: line-through; }

  .list-item .day { font-weight: 600; color: var(--accent); }
  .list-item .type {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
  }
  .list-item .task { color: var(--text); }
  .list-item .owner { color: var(--text-dim); text-align: right; font-size: 12px; }

  .badge-monthly { background: rgba(0,176,212,0.15); color: #00b0d4; }
  .badge-quarterly { background: rgba(255,170,80,0.15); color: #ffaa50; }

  /* ── Checkbox (shared) ── */
  .checkbox-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .custom-cb {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 2px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    background: transparent;
  }

  .custom-cb:hover { border-color: var(--accent); background: var(--accent-dim); }

  .custom-cb.is-checked {
    background: var(--green);
    border-color: var(--green);
  }

  .custom-cb.is-checked::after {
    content: '✓';
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    max-width: 340px;
    z-index: 100;
    box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    line-height: 1.5;
  }

  .tooltip.show { opacity: 1; }
  .tooltip .tt-prop { font-weight: 700; margin-bottom: 4px; }
  .tooltip .tt-type { font-size: 11px; font-weight: 600; margin-bottom: 6px; opacity: 0.7; }
  .tooltip .tt-task { margin-bottom: 6px; }
  .tooltip .tt-owner { font-size: 11px; color: var(--text-dim); }
  .tooltip .tt-cadence { font-size: 11px; margin-top: 4px; }
  .tooltip .tt-status { font-size: 11px; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); font-weight: 600; }

  /* ── Summary strip ── */
  .summary-strip {
    display: flex;
    gap: 16px;
    padding: 0 40px 20px;
    flex-wrap: wrap;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    min-width: 140px;
  }

  .summary-card .sc-num { font-size: 26px; font-weight: 700; color: var(--accent); }
  .summary-card .sc-num.green { color: var(--green); }
  .summary-card .sc-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ── Confirm modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  }

  .modal-box h3 { font-size: 16px; margin-bottom: 8px; }
  .modal-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }

  .modal-actions { display: flex; gap: 10px; justify-content: center; }

  .modal-btn {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    transition: all 0.2s;
  }

  .modal-btn:hover { background: var(--border); }
  .modal-btn.danger { background: rgba(229,83,75,0.15); border-color: var(--red); color: var(--red); }
  .modal-btn.danger:hover { background: rgba(229,83,75,0.25); }

  .btn-link {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(0,176,212,0.3);
    transition: all 0.2s;
  }
  .btn-link:hover { background: rgba(0,176,212,0.25); }

  @media (max-width: 800px) {
    header, .filters, .calendar-nav, .list-view, .summary-strip, .progress-section { padding-left: 16px; padding-right: 16px; }
    .calendar-grid { margin: 0 16px 24px; }
    .cal-day { min-height: 80px; padding: 4px; }
    .cal-event { font-size: 9px; }
    .list-item { grid-template-columns: 32px 60px 80px 1fr 80px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1 style="display:flex;align-items:center;gap:14px"><img src="assets/First_Mile_Capital_Logo_RGB.png" style="height:44px;width:auto" alt="First Mile Capital"><span style="color:var(--text-dim);font-weight:400;font-size:14px">Accounting Calendar — 2026</span></h1>
  <div class="header-right">
    <a class="btn-link" href="FM Manage.html">Manage Data</a>
    <div class="view-toggle">
      <button class="active" onclick="setView('calendar')">Calendar</button>
      <button onclick="setView('list')">By Investment</button>
      <button onclick="setView('checklist')">Checklist</button>
    </div>
  </div>
</header>

<div class="summary-strip">
  <div class="summary-card"><div class="sc-num" id="totalTasks">14</div><div class="sc-label">Total Deadlines</div></div>
  <div class="summary-card"><div class="sc-num green" id="completedCount">0</div><div class="sc-label">Completed This Month</div></div>
  <div class="summary-card"><div class="sc-num" id="remainingCount">0</div><div class="sc-label">Remaining</div></div>
  <div class="summary-card"><div class="sc-num" id="propertiesCount">8</div><div class="sc-label">Properties / Funds</div></div>
</div>

<!-- Progress bar -->
<div class="progress-section">
  <div class="progress-header">
    <div class="progress-label"><span class="done-count" id="progDone">0</span> / <span class="total-count" id="progTotal">0</span> tasks completed</div>
    <div class="progress-actions">
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="all-done-banner" id="allDoneBanner">All tasks complete for this month!</div>
</div>

<div class="filters" id="filters"></div>

<div id="calendarView">
  <div class="calendar-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="calendar-grid" id="calGrid"></div>
</div>

<div class="list-view" id="listView"></div>

<!-- Checklist View -->
<div class="list-view" id="checklistView" style="display:none;"></div>

<div class="tooltip" id="tooltip"></div>

<!-- Reset confirmation modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <h3>Reset all checkboxes?</h3>
    <p>This will clear all completed tasks for the current month. This can't be undone.</p>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">Cancel</button>
      <button class="modal-btn danger" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<script>
// ── Load from shared store if available ──
function loadSharedData() {
  try {
    const raw = localStorage.getItem('fm_cal_data');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.deadlines && d.properties) return d;
    }
  } catch(e) {}
  return null;
}

const shared = loadSharedData();

const DEFAULT_EVENTS = [
  { id: 0, day: 8, cadence: "Monthly", property: "Pref Fund I - Solow", type: "AM Fee", task: "Transfer Solow AM fees to FMC - $5,208 (BofA scheduled)", owner: "BofA - automatic" },
  { id: 1, day: 8, cadence: "Monthly", property: "41 Flatbush Ave", type: "AM Fee", task: "Receive JLL Financial Package from JLL. Invoice them for AM Fee - 2.5%", owner: "Anthony" },
  { id: 2, day: 10, cadence: "Monthly", property: "Paramus Plaza", type: "Reporting", task: "Upload Monthly Management Reports to DRA", owner: "Anthony" },
  { id: 3, day: 20, cadence: "Quarterly", property: "Pref Fund II - JPY", type: "Investor Payment", task: "Purchase JPY to Goldman Sachs. Loan from FMC if cash shortfall.", owner: "Anthony" },
  { id: 4, day: 20, cadence: "Quarterly", property: "Pref Fund II - JPY", type: "Investor Payment", task: "Send JPY to investors via Goldman Sachs", owner: "Anthony" },
  { id: 5, day: 20, cadence: "Monthly", property: "61 S Paramus", type: "AM Fee", task: "Transfer distros from property to FM Paramus Member (BofA scheduled)", owner: "BofA - automatic" },
  { id: 6, day: 21, cadence: "Monthly", property: "61 S Paramus", type: "AM Fee", task: "Transfer AM fee split 48k to FM and 4k to Ring (BofA scheduled)", owner: "BofA - automatic" },
  { id: 7, day: 23, cadence: "Monthly", property: "61 S Paramus", type: "Investor Payment", task: "Send Distros via Appfolio", owner: "Anthony" },
  { id: 8, day: 23, cadence: "Monthly", property: "Paramus Plaza", type: "Investor Payment", task: "Send Distros via Appfolio", owner: "Anthony" },
  { id: 9, day: 23, cadence: "Monthly", property: "One River Centre", type: "Investor Payment", task: "Send Distros via Appfolio (*Xuan sends for now, will be transferred soon to Anthony)", owner: "Xuan" },
  { id: 10, day: 23, cadence: "Monthly", property: "1700 East Putnam", type: "Investor Payment", task: "Send Distros via Appfolio (*Currently Suspended)", owner: "Xuan" },
  { id: 11, day: 23, cadence: "Monthly", property: "Pref Fund I - Solow", type: "Investor Payment", task: "Send Distros via Appfolio", owner: "Anthony" },
  { id: 12, day: 25, cadence: "Monthly", property: "Paramus Plaza", type: "AM Fee", task: "Pay Paramus Plaza AM Fee, if cash distro received by DRA", owner: "Anthony" },
  { id: 13, day: 25, cadence: "Quarterly", property: "ALL", type: "Reporting", task: "Send Asset Management Report", owner: "Morris" },
];

// Use shared data if the management page has saved it, otherwise use defaults
const EVENTS = shared
  ? shared.deadlines.map((d, i) => ({ id: i, ...d }))
  : DEFAULT_EVENTS;

const DEFAULT_COLORS = {
  "Pref Fund I - Solow": { bg: "rgba(0,176,212,0.15)", fg: "#00b0d4", border: "#00b0d4" },
  "41 Flatbush Ave":     { bg: "rgba(80,220,180,0.15)", fg: "#50dcb4", border: "#50dcb4" },
  "Paramus Plaza":       { bg: "rgba(255,140,90,0.15)", fg: "#ff8c5a", border: "#ff8c5a" },
  "Pref Fund II - JPY":  { bg: "rgba(220,120,255,0.15)", fg: "#dc78ff", border: "#dc78ff" },
  "61 S Paramus":        { bg: "rgba(255,210,80,0.15)", fg: "#ffd250", border: "#ffd250" },
  "One River Centre":    { bg: "rgba(80,200,255,0.15)", fg: "#50c8ff", border: "#50c8ff" },
  "1700 East Putnam":    { bg: "rgba(255,100,130,0.15)", fg: "#ff6482", border: "#ff6482" },
  "ALL":                 { bg: "rgba(180,180,180,0.15)", fg: "#b4b4b4", border: "#b4b4b4" },
};

// Build COLORS from shared data or defaults
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

const COLORS = shared
  ? Object.fromEntries(Object.entries(shared.properties).map(([k,v]) => [k, { bg: hexToRgba(v.color, 0.15), fg: v.color, border: v.color }]))
  : DEFAULT_COLORS;

let currentMonth = 0;
let currentView = 'calendar';
let activeFilters = new Set(Object.keys(COLORS));

const today = new Date();
const todayDay = today.getDate();
const todayMonth = today.getMonth();
const todayYear = today.getFullYear();

// ── LocalStorage for check states ──
function storageKey(month) { return `fm_cal_checks_2026_${month}`; }

function loadChecks(month) {
  try {
    const raw = localStorage.getItem(storageKey(month));
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveChecks(month, checks) {
  try { localStorage.setItem(storageKey(month), JSON.stringify(checks)); } catch(e) {}
}

function isChecked(eventId, month) {
  const checks = loadChecks(month);
  return !!checks[eventId];
}

function toggleCheck(eventId, month) {
  const checks = loadChecks(month);
  if (checks[eventId]) {
    delete checks[eventId];
  } else {
    checks[eventId] = { at: new Date().toISOString(), by: '' };
  }
  saveChecks(month, checks);
  render();
}

function getCheckedTimestamp(eventId, month) {
  const checks = loadChecks(month);
  return checks[eventId] ? checks[eventId].at : null;
}

// ── Filters ──
function buildFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  Object.keys(COLORS).forEach(prop => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip active';
    chip.textContent = prop;
    chip.style.setProperty('--chip-color', COLORS[prop].fg);
    chip.style.setProperty('--chip-bg', COLORS[prop].bg);
    chip.onclick = () => {
      if (activeFilters.has(prop)) { activeFilters.delete(prop); chip.classList.remove('active'); }
      else { activeFilters.add(prop); chip.classList.add('active'); }
      render();
    };
    el.appendChild(chip);
  });
}

function getFilteredEvents() {
  return EVENTS.filter(e => activeFilters.has(e.property));
}

function isQuarterMonth(month) {
  return [0,3,6,9].includes(month);
}

function getMonthEvents(month) {
  return getFilteredEvents().filter(e => {
    if (e.cadence === "Monthly") return true;
    if (e.cadence === "Quarterly") return isQuarterMonth(month);
    return false;
  });
}

function daysInMonth(m, y) { return new Date(y, m + 1, 0).getDate(); }
function firstDayOfMonth(m, y) { return new Date(y, m, 1).getDay(); }

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function ordinal(n) {
  const s = ["th","st","nd","rd"];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// ── Progress ──
function updateProgress() {
  const events = getMonthEvents(currentMonth);
  const total = events.length;
  const done = events.filter(e => isChecked(e.id, currentMonth)).length;
  const remaining = total - done;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('progDone').textContent = done;
  document.getElementById('progTotal').textContent = total;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('completedCount').textContent = done;
  document.getElementById('remainingCount').textContent = remaining;
  document.getElementById('totalTasks').textContent = total;

  const banner = document.getElementById('allDoneBanner');
  if (done === total && total > 0) banner.classList.add('show');
  else banner.classList.remove('show');
}

// ── Calendar View ──
function renderCalendar() {
  const month = currentMonth;
  document.getElementById('monthLabel').textContent = MONTHS[month] + ' 2026';

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const hd = document.createElement('div');
    hd.className = 'cal-header';
    hd.textContent = d;
    grid.appendChild(hd);
  });

  const fd = firstDayOfMonth(month, 2026);
  const dim = daysInMonth(month, 2026);
  const events = getMonthEvents(month);

  for (let i = 0; i < fd; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= dim; d++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (d === todayDay && month === todayMonth && 2026 === todayYear) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    const dayEvents = events.filter(e => e.day === d);
    dayEvents.forEach(ev => {
      const c = COLORS[ev.property] || COLORS["ALL"];
      const checked = isChecked(ev.id, month);
      const tag = document.createElement('div');
      tag.className = 'cal-event' + (checked ? ' checked' : '');
      tag.style.background = c.bg;
      tag.style.color = c.fg;
      tag.style.borderLeftColor = checked ? 'var(--green)' : c.border;

      const cb = document.createElement('div');
      cb.className = 'cal-check' + (checked ? ' is-checked' : '');
      cb.style.borderColor = checked ? 'var(--green)' : c.fg;
      cb.innerHTML = checked ? '✓' : '';
      cb.onclick = (e) => { e.stopPropagation(); toggleCheck(ev.id, month); };

      const txt = document.createElement('span');
      txt.className = 'ev-text';
      txt.innerHTML = `<span class="ev-label">${ev.property === "ALL" ? "ALL" : ev.property.split(' ').slice(0,2).join(' ')}</span> · ${ev.type}`;

      tag.appendChild(cb);
      tag.appendChild(txt);
      tag.onmouseenter = (e) => showTooltip(e, ev);
      tag.onmouseleave = hideTooltip;
      cell.appendChild(tag);
    });

    grid.appendChild(cell);
  }
}

// ── List View (by investment) ──
function renderList() {
  const el = document.getElementById('listView');
  el.innerHTML = '';

  const grouped = {};
  getFilteredEvents().forEach(ev => {
    if (!grouped[ev.property]) grouped[ev.property] = [];
    grouped[ev.property].push(ev);
  });

  Object.keys(grouped).sort().forEach(prop => {
    const items = grouped[prop];
    const c = COLORS[prop] || COLORS["ALL"];

    const group = document.createElement('div');
    group.className = 'inv-group';

    const checkedInGroup = items.filter(e => isChecked(e.id, currentMonth)).length;
    group.innerHTML = `
      <div class="inv-group-header">
        <div class="inv-dot" style="background:${c.fg}"></div>
        <h3>${prop}</h3>
        <div class="count">${checkedInGroup}/${items.length} done</div>
      </div>
    `;

    items.sort((a, b) => a.day - b.day).forEach(ev => {
      const checked = isChecked(ev.id, currentMonth);
      const row = document.createElement('div');
      row.className = 'list-item' + (checked ? ' checked' : '');
      row.innerHTML = `
        <div class="checkbox-wrap"><div class="custom-cb ${checked ? 'is-checked' : ''}" data-id="${ev.id}"></div></div>
        <div class="day">${ordinal(ev.day)}</div>
        <div class="type badge-${ev.cadence.toLowerCase()}">${ev.cadence}</div>
        <div class="task">${ev.task}</div>
        <div class="owner">${ev.owner}</div>
      `;
      row.querySelector('.custom-cb').onclick = () => toggleCheck(ev.id, currentMonth);
      group.appendChild(row);
    });

    el.appendChild(group);
  });
}

// ── Checklist View (flat, sorted by day) ──
function renderChecklist() {
  const el = document.getElementById('checklistView');
  el.innerHTML = '';

  const events = getMonthEvents(currentMonth).sort((a, b) => a.day - b.day || a.id - b.id);

  // Group by day
  const byDay = {};
  events.forEach(ev => {
    if (!byDay[ev.day]) byDay[ev.day] = [];
    byDay[ev.day].push(ev);
  });

  Object.keys(byDay).sort((a, b) => +a - +b).forEach(day => {
    const dayEvts = byDay[day];

    const section = document.createElement('div');
    section.className = 'inv-group';

    const checkedInDay = dayEvts.filter(e => isChecked(e.id, currentMonth)).length;
    section.innerHTML = `
      <div class="inv-group-header">
        <h3>${MONTHS[currentMonth]} ${ordinal(+day)}</h3>
        <div class="count">${checkedInDay}/${dayEvts.length} done</div>
      </div>
    `;

    dayEvts.forEach(ev => {
      const c = COLORS[ev.property] || COLORS["ALL"];
      const checked = isChecked(ev.id, currentMonth);
      const ts = getCheckedTimestamp(ev.id, currentMonth);
      const timeStr = ts ? new Date(ts).toLocaleString() : '';

      const row = document.createElement('div');
      row.className = 'list-item' + (checked ? ' checked' : '');
      row.style.borderLeft = `4px solid ${checked ? 'var(--green)' : c.border}`;
      row.innerHTML = `
        <div class="checkbox-wrap"><div class="custom-cb ${checked ? 'is-checked' : ''}" data-id="${ev.id}"></div></div>
        <div class="day" style="color:${c.fg}">${ev.property}</div>
        <div class="type badge-${ev.cadence.toLowerCase()}">${ev.type}</div>
        <div class="task">${ev.task}${checked ? '<br><span style="font-size:10px;color:var(--green);">Completed ' + timeStr + '</span>' : ''}</div>
        <div class="owner">${ev.owner}</div>
      `;
      row.querySelector('.custom-cb').onclick = () => toggleCheck(ev.id, currentMonth);
      section.appendChild(row);
    });

    el.appendChild(section);
  });
}

// ── Render ──
function render() {
  renderCalendar();
  renderList();
  renderChecklist();
  updateProgress();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.view-toggle button');
  if (v === 'calendar') {
    btns[0].classList.add('active');
    document.getElementById('calendarView').style.display = '';
    document.getElementById('listView').style.display = 'none';
    document.getElementById('checklistView').style.display = 'none';
  } else if (v === 'list') {
    btns[1].classList.add('active');
    document.getElementById('calendarView').style.display = 'none';
    document.getElementById('listView').style.display = 'block';
    document.getElementById('checklistView').style.display = 'none';
  } else {
    btns[2].classList.add('active');
    document.getElementById('calendarView').style.display = 'none';
    document.getElementById('listView').style.display = 'none';
    document.getElementById('checklistView').style.display = 'block';
  }
}

function changeMonth(delta) {
  currentMonth = Math.max(0, Math.min(11, currentMonth + delta));
  render();
}

// ── Bulk actions ──
function markAllDone() {
  const events = getMonthEvents(currentMonth);
  const checks = loadChecks(currentMonth);
  events.forEach(ev => {
    if (!checks[ev.id]) checks[ev.id] = { at: new Date().toISOString(), by: '' };
  });
  saveChecks(currentMonth, checks);
  render();
}

function confirmReset() {
  document.getElementById('resetModal').classList.add('show');
}

function closeModal() {
  document.getElementById('resetModal').classList.remove('show');
}

function doReset() {
  saveChecks(currentMonth, {});
  closeModal();
  render();
}

// ── Tooltip ──
function showTooltip(e, ev) {
  const tt = document.getElementById('tooltip');
  const c = COLORS[ev.property] || COLORS["ALL"];
  const checked = isChecked(ev.id, currentMonth);
  const ts = getCheckedTimestamp(ev.id, currentMonth);
  const timeStr = ts ? new Date(ts).toLocaleString() : '';

  tt.innerHTML = `
    <div class="tt-prop" style="color:${c.fg}">${ev.property}</div>
    <div class="tt-type">${ev.type} · ${ev.cadence}</div>
    <div class="tt-task">${ev.task}</div>
    <div class="tt-owner">Owner: ${ev.owner}</div>
    <div class="tt-cadence">Due: ${ordinal(ev.day)} of ${ev.cadence === 'Monthly' ? 'every month' : 'quarter months (Jan, Apr, Jul, Oct)'}</div>
    <div class="tt-status" style="color: ${checked ? 'var(--green)' : 'var(--red)'}">
      ${checked ? 'Completed ' + timeStr : 'Not yet completed'}
    </div>
  `;
  const rect = e.target.getBoundingClientRect();
  let left = rect.right + 12;
  let top = rect.top;
  if (left + 340 > window.innerWidth) left = rect.left - 352;
  if (top + 200 > window.innerHeight) top = window.innerHeight - 210;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
  tt.classList.add('show');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ── Init ──
currentMonth = todayMonth < 0 || todayYear !== 2026 ? 0 : todayMonth;
buildFilters();
render();
</script>
