function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
}

async function uploadBatch(rows) {
  const resp = await fetch(SUPA_URL + '/rest/v1/budget_line_items', {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify(rows)
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error('Upload failed: ' + resp.status + ' ' + text);
  }
  return resp.status;
}

async function main() {
  const batchSize = 200;
  const total = allRows.length;
  let uploaded = 0;
  
  log('Total rows: ' + total);
  log('Batch size: ' + batchSize);
  log('Starting upload...\n');
  
  for (let i = 0; i < total; i += batchSize) {
    const batch = allRows.slice(i, i + batchSize);
    const batchNum = Math.floor(i / batchSize) + 1;
    const totalBatches = Math.ceil(total / batchSize);
    
    try {
      const status = await uploadBatch(batch);
      uploaded += batch.length;
      const pct = Math.round(uploaded / total * 100);
      document.getElementById('status').textContent = 'Uploading... ' + pct + '%';
      document.getElementById('progress').textContent = uploaded + ' / ' + total + ' rows';
      log('Batch ' + batchNum + '/' + totalBatches + ': ' + batch.length + ' rows → ' + status);
    } catch (e) {
      log('ERROR on batch ' + batchNum + ': ' + e.message);
      document.getElementById('status').textContent = 'ERROR - see log';
      return;
    }
  }
  
  document.getElementById('status').textContent = '✅ COMPLETE';
  document.title = 'UPLOAD_COMPLETE_' + uploaded;
  log('\n✅ Upload complete! ' + uploaded + ' rows inserted.');
}

main();
