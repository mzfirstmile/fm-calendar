<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 72" fill="none">
  <!-- FM Icon - two overlapping L-shapes with diagonal cuts -->
  <!-- Dark navy inverted-L (top + left) -->
  <polygon points="0,0 52,0 52,16 16,16 16,56 0,56" fill="#283d55"/>
  <!-- Diagonal overlap top-right -->
  <polygon points="36,0 52,0 52,16 36,16" fill="#1e2f44"/>
  <!-- Cyan right bar -->
  <polygon points="36,0 52,0 52,56 36,56" fill="#00c8eb"/>
  <!-- Diagonal cut on right bar top -->
  <polygon points="36,0 52,0 52,16 36,16" fill="#1e2f44"/>
  <!-- Cyan bottom bar -->
  <polygon points="0,40 36,40 36,56 0,56" fill="#00c8eb"/>
  <!-- Diagonal cut on bottom bar left -->
  <polygon points="0,40 16,40 16,56 0,56" fill="#1e2f44"/>
  <!-- Inner cutout to create the nested frame effect -->
  <rect x="16" y="16" width="20" height="24" fill="transparent"/>
  <!-- Small inner architectural detail - dark inner corner -->
  <polygon points="16,16 36,16 36,40 16,40" fill="none"/>

  <!-- FIRSTMILE text -->
  <text x="68" y="40" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36" font-weight="300" letter-spacing="1.5">
    <tspan fill="#e2e8f0">FIRST</tspan><tspan fill="#00c8eb">MILE</tspan>
  </text>
  <!-- CAPITAL text -->
  <text x="69" y="62" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="17" font-weight="400" letter-spacing="8" fill="#8ea3be">CAPITAL</text>
</svg>
